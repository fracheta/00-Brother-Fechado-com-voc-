<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>00brother – Nova Ocorrência</title>
    <meta name="description" content="00brother - Reporte problemas na sua cidade. Iluminação, buracos, água, segurança e muito mais.">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        :root {
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.25);
            --primary-glass: rgba(255, 215, 0, 0.08);
            --bg: #0f0f0f;
            --bg-elevated: rgba(255, 255, 255, 0.03);
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #b0b0b0;
            --text-dim: #707070;
            --danger: #ff4444;
            --success: #2ecc71;
            --info: #3498db;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 28px rgba(0,0,0,0.5);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);
            --shadow-glow: 0 0 40px rgba(255,215,0,0.2);
            --shadow-glow-strong: 0 0 80px rgba(255,215,0,0.4);
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-spring: cubic-bezier(0.34, 1.8, 0.64, 1);
            --duration-instant: 80ms;
            --duration-fast: 180ms;
            --duration-normal: 350ms;
            --duration-slow: 600ms;
            --text-body: clamp(0.875rem, 0.85rem + 0.1vw, 0.95rem);
            --text-small: clamp(0.7rem, 0.68rem + 0.08vw, 0.8rem);
            --header-h: 72px;
            --sidebar-w: 260px;
            --feed-max-w: 660px;
            --widget-w: 290px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f2f5;
                --bg-elevated: rgba(0,0,0,0.02);
                --surface: rgba(0,0,0,0.03);
                --surface-hover: rgba(0,0,0,0.06);
                --glass: rgba(255,255,255,0.7);
                --glass-strong: rgba(255,255,255,0.9);
                --glass-border: rgba(0,0,0,0.08);
                --text-main: #1a1a1a;
                --text-secondary: #555;
                --text-dim: #999;
                --primary-glow: rgba(255,215,0,0.4);
            }
        }

        body.high-contrast {
            --bg: #000 !important;
            --text-main: #fff !important;
            --surface: #111 !important;
            --primary: #FFFF00 !important;
            --glass-border: #fff !important;
            --primary-glow: rgba(255,255,0,0.6) !important;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
            transition: background var(--duration-normal) var(--ease-out-expo);
            font-size: var(--text-body);
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 30% 0%, rgba(255,215,0,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 100%, rgba(255,140,0,0.03) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
            animation: ambientGlow 12s ease-in-out infinite alternate;
        }
        @keyframes ambientGlow { 0% { opacity: 0.7; } 100% { opacity: 1; } }
        a { color: inherit; text-decoration: none; }
        button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
        img { max-width: 100%; display: block; }
        ::selection { background: var(--primary); color: #000; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        #particlesCanvas { position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: 0.3; }

        .app-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            height: var(--header-h); padding: 0 24px;
            background: rgba(15,15,15,0.7); backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            transition: background var(--duration-normal), box-shadow var(--duration-normal);
        }
        .app-header.scrolled { box-shadow: var(--shadow-md); }
        .brand { display: flex; align-items: center; gap: 12px; user-select: none; }
        .logo-circle {
            width: 44px; height: 44px; background: var(--primary);
            border-radius: var(--radius-sm); display: flex; align-items: center;
            justify-content: center; font-weight: 900; color: #000;
            font-size: 1.2rem; box-shadow: 0 0 24px var(--primary-glow);
            transition: transform var(--duration-normal) var(--ease-spring), box-shadow var(--duration-normal);
            position: relative; overflow: hidden;
        }
        .logo-circle::after { content: ''; position: absolute; inset: -20%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%); opacity: 0; transition: opacity var(--duration-fast); }
        .logo-circle:hover::after { opacity: 0.4; }
        .logo-circle:hover { transform: scale(1.08); box-shadow: 0 0 40px var(--primary-glow); }
        .logo-circle:active { transform: scale(0.94); }
        .brand h1 { font-size: clamp(1.2rem, 1.1rem + 0.3vw, 1.4rem); font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
        .brand h1 span { display: block; font-size: 0.5rem; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-dim); }
        .header-actions { display: flex; gap: 20px; align-items: center; }
        .header-actions a, .header-actions button { color: var(--text-secondary); font-size: 1.15rem; transition: var(--duration-fast); position: relative; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .header-actions a:hover, .header-actions button:hover { color: var(--primary); background: var(--primary-glass); }
        .badge-dot { position: absolute; top: 4px; right: 4px; width: 9px; height: 9px; background: var(--danger); border-radius: 50%; border: 2px solid var(--bg); animation: pulseBadge 2s ease-in-out infinite; }
        @keyframes pulseBadge { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        .menu-toggle { display: none; }

        .sidebar {
            width: var(--sidebar-w); flex-shrink: 0;
            padding: 20px 14px; border-right: 1px solid var(--glass-border);
            background: rgba(15,15,15,0.3); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; gap: 4px;
            position: sticky; top: var(--header-h);
            height: calc(100vh - var(--header-h));
            overflow-y: auto; z-index: 500;
            transition: transform var(--duration-normal) var(--ease-out-expo);
        }
        .sidebar-nav-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2.5px; color: var(--text-dim); padding: 10px 14px 6px; font-weight: 700; }
        .sidebar a { display: flex; align-items: center; gap: 14px; padding: 11px 16px; border-radius: var(--radius-md); color: var(--text-secondary); font-weight: 500; font-size: 0.88rem; transition: var(--duration-fast); position: relative; }
        .sidebar a::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: var(--primary); border-radius: 0 3px 3px 0; transition: height var(--duration-fast) var(--ease-out-expo); }
        .sidebar a:hover { background: var(--surface-hover); color: var(--primary); }
        .sidebar a.active { background: var(--primary-glass); color: var(--primary); font-weight: 700; }
        .sidebar a.active::before { height: 24px; }
        .sidebar a i { width: 22px; text-align: center; font-size: 1.1rem; }
        .sidebar .new-post-btn {
            background: linear-gradient(135deg, var(--primary), #ffaa00);
            color: #000; justify-content: center; font-weight: 700;
            margin-top: 14px; border-radius: var(--radius-lg); padding: 14px;
            font-size: 0.95rem; gap: 8px; box-shadow: 0 8px 24px rgba(255,215,0,0.3);
            transition: all var(--duration-normal) var(--ease-spring);
        }
        .sidebar .new-post-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(255,215,0,0.5); filter: brightness(1.1); }

        .app-layout { display: flex; min-height: 100vh; padding-top: var(--header-h); }
        .main-area { flex: 1; display: flex; justify-content: center; padding: 28px 36px; gap: 36px; min-width: 0; }
        .form-wrapper { flex: 1; max-width: 700px; min-width: 0; }

        .form-card {
            background: var(--surface); border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg); overflow: hidden;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
        }
        .form-header {
            padding: 20px 24px; border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 14px;
        }
        .form-header i { font-size: 1.5rem; color: var(--primary); }
        .form-header h2 { font-size: 1.2rem; font-weight: 700; }
        .form-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .form-group label i { color: var(--primary); width: 16px; text-align: center; }
        .form-group select, .form-group input, .form-group textarea {
            padding: 12px 16px; border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border); background: var(--bg);
            color: var(--text-main); font-family: inherit; font-size: 0.9rem;
            outline: none; transition: border-color var(--duration-fast);
            width: 100%;
        }
        .form-group select option { background: var(--bg); color: var(--text-main); }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }
        .file-upload-area {
            border: 2px dashed var(--glass-border); border-radius: var(--radius-md);
            padding: 20px; text-align: center; cursor: pointer;
            transition: all var(--duration-fast); color: var(--text-dim);
        }
        .file-upload-area:hover { border-color: var(--primary); background: var(--primary-glass); color: var(--primary); }
        .file-upload-area i { font-size: 2rem; margin-bottom: 8px; display: block; }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary), #ffaa00);
            color: #000; padding: 14px 32px; border-radius: var(--radius-full);
            font-weight: 700; font-size: 1rem; display: inline-flex; align-items: center;
            gap: 10px; justify-content: center; transition: all var(--duration-fast);
            box-shadow: 0 8px 24px rgba(255,215,0,0.3); width: 100%;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,215,0,0.5); filter: brightness(1.1); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #miniMap { height: 200px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); margin-top: 6px; }
        .location-buttons { display: flex; gap: 10px; margin-top: 6px; }
        .btn-location {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
            border-radius: var(--radius-full); border: 1px solid var(--glass-border);
            font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);
            transition: all var(--duration-fast);
        }
        .btn-location:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glass); }

        .toast-container { position: fixed; top: calc(var(--header-h) + 16px); right: 24px; z-index: 4000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--glass-strong); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); color: var(--text-main); padding: 14px 22px; border-radius: var(--radius-lg); font-weight: 600; font-size: 0.85rem; box-shadow: var(--shadow-lg); animation: toastIn 0.4s var(--ease-spring) forwards; pointer-events: auto; max-width: 360px; }
        .toast.removing { animation: toastOut 0.3s var(--ease-out-expo) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(120%) scale(0.9); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(120%) scale(0.9); } }

        .a11y-fab { position: fixed; bottom: 28px; right: 28px; z-index: 1999; width: 48px; height: 48px; border-radius: 50%; background: var(--surface); border: 1px solid var(--glass-border); color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; backdrop-filter: blur(10px); transition: all var(--duration-fast); box-shadow: var(--shadow-sm); }
        .a11y-fab:hover { background: var(--primary); color: #000; border-color: var(--primary); transform: scale(1.1); box-shadow: var(--shadow-glow-strong); }
        .a11y-panel { position: fixed; top: 0; left: 0; right: 0; z-index: 2001; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); color: #ccc; padding: 14px 5%; font-size: var(--text-small); display: flex; justify-content: center; flex-wrap: wrap; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); transform: translateY(-100%); transition: transform var(--duration-normal) var(--ease-out-expo); }
        .a11y-panel.visible { transform: translateY(0); }
        .a11y-panel button { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-full); border: 1px solid #555; font-size: 0.75rem; font-weight: 500; transition: var(--duration-fast); color: #ddd; }
        .a11y-panel button:hover, .a11y-panel button.active { background: var(--primary); color: #000; border-color: var(--primary); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0; transform: translateX(-100%); z-index: 1500; background: rgba(15,15,15,0.97); width: 280px; }
            .sidebar.mobile-open { transform: translateX(0); }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1400; }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .main-area { padding: 16px 10px; }
            .form-row { flex-direction: column; }
            .toast-container { right: 10px; left: 10px; align-items: stretch; }
            .toast { max-width: 100%; }
        }
        @media (max-width: 480px) {
            .app-header { padding: 0 12px; }
            .brand h1 { font-size: 1.1rem; }
            .header-actions { gap: 12px; }
        }
    </style>
</head>
<body>

    <canvas id="particlesCanvas" aria-hidden="true"></canvas>

    <div class="a11y-panel" id="a11yPanel" role="region" aria-label="Acessibilidade">
        <span style="font-weight:700;color:#fff;">Acessibilidade:</span>
        <button id="toggleContrast" aria-label="Alto contraste"><i class="fa-solid fa-circle-half-stroke"></i> Contraste</button>
        <button id="increaseFont" aria-label="Aumentar fonte"><i class="fa-solid fa-text-height"></i> A+</button>
        <button id="toggleTheme" aria-label="Alternar tema"><i class="fa-solid fa-moon"></i> Tema</button>
        <button id="toggleFocus" aria-label="Modo foco"><i class="fa-solid fa-expand"></i> Foco</button>
    </div>
    <button class="a11y-fab" id="a11yFab" aria-label="Opções de acessibilidade" title="Acessibilidade">
        <i class="fa-solid fa-universal-access"></i>
    </button>

    <div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header class="app-header" id="appHeader" role="banner">
        <div style="display:flex; align-items:center; gap:16px;">
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" title="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a href="10.html" class="brand" aria-label="00brother - Ir para o início">
                <div class="logo-circle" id="logoCircle">00</div>
                <h1>00brother <span>Fechado com você</span></h1>
            </a>
        </div>
        <div class="header-actions">
            <button popovertarget="searchPopover" aria-label="Buscar" title="Buscar">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <a href="70.html" aria-label="Notificações" title="Notificações" style="position:relative;">
                <i class="fa-solid fa-bell"></i>
                <span class="badge-dot" aria-hidden="true"></span>
            </a>
        </div>
    </header>

    <div id="searchPopover" popover style="position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--glass-strong);backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:16px;width:min(400px,90vw);z-index:5000;color:var(--text-main);">
        <input type="text" placeholder="Buscar na cidade..." style="width:100%;padding:12px 16px;border-radius:var(--radius-full);border:1px solid var(--glass-border);background:var(--surface);color:var(--text-main);font-size:0.9rem;outline:none;">
    </div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu principal">
            <span class="sidebar-nav-label">Navegação</span>
            <a href="10.html"><i class="fa-solid fa-house"></i> Início</a>
            <a href="30.html"><i class="fa-solid fa-map-location-dot"></i> Mapa da Cidade</a>
            <a href="70.html"><i class="fa-solid fa-bell"></i> Alertas</a>
            <a href="90.html"><i class="fa-solid fa-calendar-days"></i> Eventos</a>
            <a href="50.html"><i class="fa-solid fa-briefcase"></i> Vagas</a>
            <span class="sidebar-nav-label" style="margin-top:10px;">Comunidade</span>
            <a href="100.html"><i class="fa-solid fa-road-barrier"></i> Obras</a>
            <a href="110.html"><i class="fa-solid fa-hospital"></i> Saúde</a>
            <a href="120.html"><i class="fa-solid fa-graduation-cap"></i> Escolas</a>
            <a href="60.html"><i class="fa-solid fa-user"></i> Meu Perfil</a>
            <a href="40.html" class="active new-post-btn"><i class="fa-solid fa-plus"></i> Nova Ocorrência</a>
        </aside>

        <main class="main-area">
            <div class="form-wrapper">
                <div class="form-card">
                    <div class="form-header">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <h2>Reportar Nova Ocorrência</h2>
                    </div>
                    <div class="form-body">
                        <div class="form-group">
                            <label for="tipo"><i class="fa-solid fa-tag"></i> Tipo de Ocorrência *</label>
                            <select id="tipo" required>
                                <option value="">Selecione...</option>
                                <option value="iluminacao">💡 Iluminação Pública</option>
                                <option value="buraco">🕳️ Buraco na Rua</option>
                                <option value="agua-esgoto">💧 Água / Esgoto</option>
                                <option value="sinalizacao">🚦 Sinalização de Trânsito</option>
                                <option value="limpeza">🗑️ Limpeza Urbana</option>
                                <option value="seguranca">🛡️ Segurança Pública</option>
                                <option value="arvore">🌳 Árvore / Poda</option>
                                <option value="transporte">🚌 Transporte Coletivo</option>
                                <option value="outro">📌 Outro</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="titulo"><i class="fa-solid fa-pen"></i> Título *</label>
                            <input type="text" id="titulo" placeholder="Ex: Poste apagado na Rua das Flores" required>
                        </div>

                        <div class="form-group">
                            <label for="descricao"><i class="fa-solid fa-align-left"></i> Descrição *</label>
                            <textarea id="descricao" placeholder="Descreva o problema com detalhes: local, horário, situação..." required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="endereco"><i class="fa-solid fa-location-dot"></i> Endereço *</label>
                                <input type="text" id="endereco" placeholder="Rua, número, bairro" required>
                            </div>
                            <div class="form-group">
                                <label for="ponto-referencia"><i class="fa-solid fa-map-pin"></i> Ponto de Referência</label>
                                <input type="text" id="ponto-referencia" placeholder="Próximo a...">
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fa-solid fa-map"></i> Localização no Mapa</label>
                            <div id="miniMap"></div>
                            <div class="location-buttons">
                                <button type="button" class="btn-location" id="btnLocation"><i class="fa-solid fa-location-crosshairs"></i> Usar minha localização</button>
                                <span style="font-size:0.75rem;color:var(--text-dim);display:flex;align-items:center;">Clique no mapa para marcar o local</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fa-solid fa-camera"></i> Anexar Foto (até 3)</label>
                            <div class="file-upload-area" id="fileUploadArea">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <span>Clique ou arraste as imagens aqui</span>
                                <small style="display:block;margin-top:4px;">JPG, PNG ou WEBP (máx. 5MB cada)</small>
                            </div>
                            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
                            <div id="previewContainer" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
                        </div>

                        <button type="submit" class="btn-submit" id="btnSubmit">
                            <i class="fa-solid fa-paper-plane"></i> Enviar Ocorrência
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        'use strict';

        (function() {
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId;
            const maxParticles = 50;

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); this.y = Math.random() * canvas.height; }
                reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 3 + 1; this.speed = Math.random() * 0.5 + 0.2; this.opacity = Math.random() * 0.5 + 0.1; this.drift = Math.random() * 0.4 - 0.2; }
                update() { this.y += this.speed; this.x += this.drift; if (this.y > canvas.height + 10) { this.reset(); this.y = -10; } if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0; }
                draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,215,0,${this.opacity})`; ctx.fill(); }
            }

            for (let i = 0; i < maxParticles; i++) particles.push(new Particle());

            function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); animationId = requestAnimationFrame(animate); }
            animate();

            const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (mq.matches) { cancelAnimationFrame(animationId); canvas.style.display = 'none'; }
        })();

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuToggle = document.getElementById('menuToggle');

        function openSidebar() { sidebar.classList.add('mobile-open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeSidebar() { sidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
        menuToggle.addEventListener('click', () => sidebar.classList.contains('mobile-open') ? closeSidebar() : openSidebar());
        overlay.addEventListener('click', closeSidebar);
        sidebar.querySelectorAll('a').forEach(link => { link.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar(); }); });

        (() => {
            const current = window.location.pathname.split('/').pop() || '40.html';
            sidebar.querySelectorAll('a').forEach(link => link.classList.toggle('active', link.getAttribute('href') === current));
        })();

        const a11yPanel = document.getElementById('a11yPanel');
        const a11yFab = document.getElementById('a11yFab');
        let a11yVisible = false;
        a11yFab.addEventListener('click', () => { a11yVisible = !a11yVisible; a11yPanel.classList.toggle('visible', a11yVisible); a11yFab.querySelector('i').className = a11yVisible ? 'fa-solid fa-xmark' : 'fa-solid fa-universal-access'; });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && a11yVisible) { a11yVisible = false; a11yPanel.classList.remove('visible'); a11yFab.querySelector('i').className = 'fa-solid fa-universal-access'; } });

        const contrastBtn = document.getElementById('toggleContrast');
        contrastBtn.addEventListener('click', () => { document.body.classList.toggle('high-contrast'); contrastBtn.classList.toggle('active'); localStorage.setItem('highContrast', document.body.classList.contains('high-contrast')); });
        if (localStorage.getItem('highContrast') === 'true') { document.body.classList.add('high-contrast'); contrastBtn.classList.add('active'); }

        const themeBtn = document.getElementById('toggleTheme');
        themeBtn.addEventListener('click', () => {
            const isLight = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() === '#f0f2f5';
            const styles = isLight ? ['#0f0f0f','#ffffff','rgba(255,255,255,0.04)','rgba(255,255,255,0.08)','#b0b0b0','#707070'] : ['#f0f2f5','#1a1a1a','rgba(0,0,0,0.03)','rgba(0,0,0,0.08)','#555','#999'];
            ['--bg','--text-main','--surface','--glass-border','--text-secondary','--text-dim'].forEach((v,i) => document.documentElement.style.setProperty(v, styles[i]));
            themeBtn.innerHTML = isLight ? '<i class="fa-solid fa-moon"></i> Tema' : '<i class="fa-solid fa-sun"></i> Tema';
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'light') themeBtn.click();

        const focusBtn = document.getElementById('toggleFocus');
        let focusMode = false;
        focusBtn.addEventListener('click', () => {
            focusMode = !focusMode;
            focusBtn.classList.toggle('active', focusMode);
            sidebar.style.display = focusMode ? 'none' : '';
            showToast(focusMode ? 'Modo foco ativado 🎯' : 'Modo foco desativado');
        });

        const fontBtn = document.getElementById('increaseFont');
        let fontLevel = 0;
        fontBtn.addEventListener('click', () => { fontLevel = (fontLevel + 1) % 4; document.documentElement.style.setProperty('--text-body', ['0.875rem','0.95rem','1.05rem','1.2rem'][fontLevel]); document.documentElement.style.setProperty('--text-small', ['0.7rem','0.75rem','0.85rem','0.95rem'][fontLevel]); localStorage.setItem('fontSize', fontLevel); });
        const savedFont = localStorage.getItem('fontSize'); if (savedFont) { fontLevel = parseInt(savedFont); fontBtn.click(); }

        function showToast(msg, duration = 2500) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.textContent = msg;
            container.appendChild(toast);
            const remove = () => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); };
            setTimeout(remove, duration);
            toast.addEventListener('click', remove);
            while (container.children.length > 3) { container.firstChild.remove(); }
        }

        const header = document.getElementById('appHeader');
        window.addEventListener('scroll', () => { header.classList.toggle('scrolled', window.scrollY > 10); });

        document.addEventListener('click', (e) => {
            const popover = document.getElementById('searchPopover');
            if (popover.matches(':popover-open') && !popover.contains(e.target) && e.target !== document.querySelector('[popovertarget="searchPopover"]')) {
                popover.hidePopover();
            }
        });

        // ========== MINI MAPA ==========
        let userMarker = null;
        const arapongasLat = -23.4195;
        const arapongasLng = -51.4244;
        const miniMap = L.map('miniMap').setView([arapongasLat, arapongasLng], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19
        }).addTo(miniMap);

        miniMap.on('click', function(e) {
            if (userMarker) { miniMap.removeLayer(userMarker); }
            userMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(miniMap);
            document.getElementById('endereco').value = `Lat: ${e.latlng.lat.toFixed(5)}, Lng: ${e.latlng.lng.toFixed(5)}`;
            showToast('📍 Local marcado no mapa!');
        });

        document.getElementById('btnLocation').addEventListener('click', function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    miniMap.setView([lat, lng], 16);
                    if (userMarker) { miniMap.removeLayer(userMarker); }
                    userMarker = L.marker([lat, lng]).addTo(miniMap);
                    document.getElementById('endereco').value = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
                    showToast('📍 Sua localização foi marcada!');
                }, () => {
                    showToast('Não foi possível obter sua localização');
                });
            } else {
                showToast('Geolocalização não suportada pelo seu navegador');
            }
        });

        setTimeout(() => { miniMap.invalidateSize(); }, 300);

        // ========== UPLOAD DE IMAGENS ==========
        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        let selectedFiles = [];

        fileUploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);

        fileUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadArea.style.borderColor = 'var(--primary)';
        });
        fileUploadArea.addEventListener('dragleave', () => {
            fileUploadArea.style.borderColor = 'var(--glass-border)';
        });
        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadArea.style.borderColor = 'var(--glass-border)';
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        });

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            addFiles(files);
        }

        function addFiles(files) {
            if (selectedFiles.length + files.length > 3) {
                showToast('⚠️ Máximo de 3 imagens permitidas');
                return;
            }
            files.forEach(file => {
                if (!file.type.match('image.*')) {
                    showToast('⚠️ Apenas imagens são permitidas');
                    return;
                }
                if (file.size > 5 * 1024 * 1024) {
                    showToast('⚠️ Cada imagem deve ter no máximo 5MB');
                    return;
                }
                selectedFiles.push(file);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.width = '80px';
                    img.style.height = '80px';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = 'var(--radius-sm)';
                    img.style.border = '1px solid var(--glass-border)';
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // ========== ENVIO DO FORMULÁRIO ==========
        document.getElementById('btnSubmit').addEventListener('click', function(e) {
            e.preventDefault();
            const tipo = document.getElementById('tipo').value;
            const titulo = document.getElementById('titulo').value.trim();
            const descricao = document.getElementById('descricao').value.trim();
            const endereco = document.getElementById('endereco').value.trim();

            if (!tipo || !titulo || !descricao || !endereco) {
                showToast('⚠️ Preencha todos os campos obrigatórios');
                return;
            }

            // Simulação de envio
            this.disabled = true;
            this.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enviando...';

            setTimeout(() => {
                showToast('✅ Ocorrência enviada com sucesso! Acompanhe em seu perfil.');
                this.disabled = false;
                this.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Ocorrência';
                // Limpar formulário
                document.getElementById('tipo').value = '';
                document.getElementById('titulo').value = '';
                document.getElementById('descricao').value = '';
                document.getElementById('endereco').value = '';
                document.getElementById('ponto-referencia').value = '';
                if (userMarker) { miniMap.removeLayer(userMarker); userMarker = null; }
                previewContainer.innerHTML = '';
                selectedFiles = [];
                miniMap.setView([arapongasLat, arapongasLng], 14);
            }, 1500);
        });
    </script>
</body>
</html>
