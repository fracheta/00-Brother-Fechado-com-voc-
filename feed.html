<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00 Brother - Premium Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <style>
        /* --- ARQUITETURA DE DESIGN (Linhas 1-150) ---
           Estilos baseados em profundidade, desfoque e contraste.
        */
        :root {
            --primary: #FFD700; /* Amarelo Vibrante */
            --primary-dark: #ccac00;
            --bg: #0f0f0f;      /* Fundo escuro premium */
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* --- HEADER PREMIUM (Linhas 151-250) --- */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand .logo-circle {
            width: 35px;
            height: 35px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .brand h1 {
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
        }

        /* --- STORIES / CATEGORIAS (Linhas 251-400) --- */
        .stories-container {
            margin-top: 85px;
            padding: 10px 0;
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-left: 20px;
            scrollbar-width: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 75px;
            transition: 0.3s;
        }

        .story-ring {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, var(--primary), #ff8c00, #fff);
            margin-bottom: 8px;
        }

        .story-content {
            width: 100%;
            height: 100%;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid var(--bg);
        }

        .story-item span {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        /* --- FEED DE CARTÕES (Linhas 401-800) --- */
        .main-feed {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px 100px;
        }

        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            margin-bottom: 30px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .post-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author-img {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 700;
        }
